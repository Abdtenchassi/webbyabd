<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FFFBEB"/>
  <!-- Header with logo -->
  <rect width="800" height="200" fill="#1C1210"/>
  <circle cx="400" cy="65" r="35" fill="#292017"/>
  <rect x="382" y="52" width="36" height="26" rx="4" fill="#FB923C" opacity="0.35"/>
  <text x="400" y="122" font-family="system-ui" font-size="10" fill="#D6D3D1" text-anchor="middle">Reserve Your Event</text>
  <!-- Form -->
  <rect x="120" y="160" width="560" height="330" rx="16" fill="#fff" stroke="#FED7AA" stroke-width="1"/>
  <!-- Form fields row 1 -->
  <text x="155" y="200" font-family="system-ui" font-size="10" font-weight="600" fill="#78716C">Full Name</text>
  <rect x="155" y="206" width="240" height="32" rx="6" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="415" y="200" font-family="system-ui" font-size="10" font-weight="600" fill="#78716C">Phone Number</text>
  <rect x="415" y="206" width="230" height="32" rx="6" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <!-- Event Type -->
  <text x="155" y="264" font-family="system-ui" font-size="10" font-weight="600" fill="#78716C">Event Type</text>
  <!-- Event type grid -->
  <rect x="155" y="274" width="100" height="34" rx="8" fill="#FB923C" opacity="0.12" stroke="#FB923C" stroke-width="1"/>
  <text x="205" y="295" font-family="system-ui" font-size="10" fill="#C2410C" text-anchor="middle">Wedding</text>
  <rect x="265" y="274" width="100" height="34" rx="8" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="315" y="295" font-family="system-ui" font-size="10" fill="#78716C" text-anchor="middle">Engagement</text>
  <rect x="375" y="274" width="80" height="34" rx="8" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="415" y="295" font-family="system-ui" font-size="10" fill="#78716C" text-anchor="middle">Birthday</text>
  <rect x="465" y="274" width="90" height="34" rx="8" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="510" y="295" font-family="system-ui" font-size="10" fill="#78716C" text-anchor="middle">Corporate</text>
  <rect x="155" y="316" width="100" height="34" rx="8" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="205" y="337" font-family="system-ui" font-size="10" fill="#78716C" text-anchor="middle">Baby Shower</text>
  <rect x="265" y="316" width="100" height="34" rx="8" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="315" y="337" font-family="system-ui" font-size="10" fill="#78716C" text-anchor="middle">Graduation</text>
  <rect x="375" y="316" width="100" height="34" rx="8" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="425" y="337" font-family="system-ui" font-size="10" fill="#78716C" text-anchor="middle">Anniversary</text>
  <!-- Services section -->
  <text x="155" y="378" font-family="system-ui" font-size="10" font-weight="600" fill="#78716C">Services Needed</text>
  <rect x="155" y="388" width="85" height="28" rx="6" fill="#FB923C" opacity="0.12" stroke="#FB923C" stroke-width="1"/>
  <text x="197" y="406" font-family="system-ui" font-size="9" fill="#C2410C" text-anchor="middle">Full Planning</text>
  <rect x="248" y="388" width="85" height="28" rx="6" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="290" y="406" font-family="system-ui" font-size="9" fill="#78716C" text-anchor="middle">Decoration</text>
  <rect x="341" y="388" width="85" height="28" rx="6" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="383" y="406" font-family="system-ui" font-size="9" fill="#78716C" text-anchor="middle">Floral</text>
  <rect x="434" y="388" width="75" height="28" rx="6" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="471" y="406" font-family="system-ui" font-size="9" fill="#78716C" text-anchor="middle">Lighting</text>
  <rect x="517" y="388" width="80" height="28" rx="6" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
  <text x="557" y="406" font-family="system-ui" font-size="9" fill="#78716C" text-anchor="middle">Catering</text>
  <!-- Budget slider -->
  <text x="155" y="440" font-family="system-ui" font-size="10" font-weight="600" fill="#78716C">Estimated Budget (USD)</text>
  <rect x="155" y="452" width="490" height="4" rx="2" fill="#FED7AA"/>
  <rect x="155" y="452" width="180" height="4" rx="2" fill="#FB923C"/>
  <circle cx="335" cy="454" r="8" fill="#FB923C" stroke="#fff" stroke-width="2"/>
  <text x="335" y="476" font-family="system-ui" font-size="11" font-weight="600" fill="#C2410C" text-anchor="middle">$3,000</text>
</svg>
