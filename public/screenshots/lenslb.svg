<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0A0F1C"/>
  <!-- Nav -->
  <rect y="0" width="800" height="52" fill="#0D1321" opacity="0.95"/>
  <rect x="24" y="16" width="80" height="20" rx="4" fill="#3B82F6" opacity="0.8"/>
  <rect x="600" y="16" width="60" height="20" rx="4" fill="transparent" stroke="#475569" stroke-width="1"/>
  <rect x="672" y="16" width="50" height="20" rx="10" fill="#3B82F6"/>
  <!-- Hero gradient -->
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="52" x2="800" y2="360">
      <stop offset="0%" stop-color="#0A0F1C"/>
      <stop offset="100%" stop-color="#111B2E"/>
    </linearGradient>
  </defs>
  <rect y="52" width="800" height="308" fill="url(#heroGrad)"/>
  <!-- Badge -->
  <rect x="280" y="90" width="240" height="24" rx="12" fill="#1E3A5F" opacity="0.5"/>
  <text x="400" y="106" font-family="system-ui" font-size="10" fill="#60A5FA" text-anchor="middle">Lebanon's Photography Platform</text>
  <!-- Title -->
  <text x="400" y="155" font-family="system-ui" font-size="30" font-weight="bold" fill="#F1F5F9" text-anchor="middle">Find the Perfect</text>
  <text x="400" y="192" font-family="system-ui" font-size="30" font-weight="bold" fill="#60A5FA" text-anchor="middle" font-style="italic">Photographer</text>
  <text x="400" y="226" font-family="system-ui" font-size="30" font-weight="bold" fill="#F1F5F9" text-anchor="middle">for Your Moment</text>
  <!-- Subtitle -->
  <text x="400" y="262" font-family="system-ui" font-size="12" fill="#94A3B8" text-anchor="middle">Browse real portfolios, filter by city and event type, and book</text>
  <!-- CTA Buttons -->
  <rect x="245" y="290" width="150" height="38" rx="8" fill="#3B82F6"/>
  <text x="320" y="314" font-family="system-ui" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Find a Photographer</text>
  <rect x="410" y="290" width="150" height="38" rx="8" fill="transparent" stroke="#475569" stroke-width="1"/>
  <text x="485" y="314" font-family="system-ui" font-size="12" font-weight="600" fill="#94A3B8" text-anchor="middle">Join as Photographer</text>
  <!-- Category pills -->
  <rect x="120" y="350" width="80" height="28" rx="14" fill="#1E293B"/>
  <text x="160" y="368" font-family="system-ui" font-size="10" fill="#CBD5E1" text-anchor="middle">Weddings</text>
  <rect x="210" y="350" width="80" height="28" rx="14" fill="#1E293B"/>
  <text x="250" y="368" font-family="system-ui" font-size="10" fill="#CBD5E1" text-anchor="middle">Portraits</text>
  <rect x="300" y="350" width="80" height="28" rx="14" fill="#1E293B"/>
  <text x="340" y="368" font-family="system-ui" font-size="10" fill="#CBD5E1" text-anchor="middle">Landscape</text>
  <rect x="390" y="350" width="70" height="28" rx="14" fill="#1E293B"/>
  <text x="425" y="368" font-family="system-ui" font-size="10" fill="#CBD5E1" text-anchor="middle">Fashion</text>
  <rect x="470" y="350" width="70" height="28" rx="14" fill="#1E293B"/>
  <text x="505" y="368" font-family="system-ui" font-size="10" fill="#CBD5E1" text-anchor="middle">Events</text>
  <rect x="550" y="350" width="90" height="28" rx="14" fill="#1E293B"/>
  <text x="595" y="368" font-family="system-ui" font-size="10" fill="#CBD5E1" text-anchor="middle">Engagements</text>
  <!-- Section -->
  <rect y="400" width="800" height="100" fill="#0D1321"/>
  <text x="400" y="430" font-family="system-ui" font-size="18" font-weight="bold" fill="#F1F5F9" text-anchor="middle">How It Works</text>
  <!-- Steps -->
  <rect x="100" y="450" width="160" height="36" rx="8" fill="#111B2E" stroke="#1E293B" stroke-width="1"/>
  <rect x="320" y="450" width="160" height="36" rx="8" fill="#111B2E" stroke="#1E293B" stroke-width="1"/>
  <rect x="540" y="450" width="160" height="36" rx="8" fill="#111B2E" stroke="#1E293B" stroke-width="1"/>
</svg>
