<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FAFAF9"/>
  <!-- Photo header area -->
  <rect width="800" height="220" fill="#1C1917"/>
  <!-- Logo circle -->
  <circle cx="400" cy="80" r="40" fill="#292524"/>
  <rect x="380" y="68" width="40" height="24" rx="4" fill="#A78BFA" opacity="0.4"/>
  <text x="400" y="142" font-family="system-ui" font-size="18" font-weight="bold" fill="#FAFAF9" text-anchor="middle">Noonphotoo</text>
  <text x="400" y="162" font-family="system-ui" font-size="11" fill="#A8A29E" text-anchor="middle">Capturing Your Moments</text>
  <!-- Book Now button -->
  <rect x="340" y="180" width="120" height="30" rx="6" fill="#A78BFA"/>
  <text x="400" y="200" font-family="system-ui" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Book Now</text>
  <!-- Form area -->
  <rect x="160" y="240" width="480" height="250" rx="12" fill="#fff" stroke="#E7E5E4" stroke-width="1"/>
  <text x="400" y="272" font-family="system-ui" font-size="16" font-weight="bold" fill="#1C1917" text-anchor="middle">Reserve Your Session</text>
  <text x="400" y="292" font-family="system-ui" font-size="10" fill="#A8A29E" text-anchor="middle">Fill in the details below</text>
  <!-- Form fields -->
  <text x="190" y="320" font-family="system-ui" font-size="10" font-weight="600" fill="#57534E">Full Name</text>
  <rect x="190" y="326" width="220" height="32" rx="6" fill="#FAFAF9" stroke="#D6D3D1" stroke-width="1"/>
  <text x="420" y="320" font-family="system-ui" font-size="10" font-weight="600" fill="#57534E">Phone / WhatsApp</text>
  <rect x="420" y="326" width="190" height="32" rx="6" fill="#FAFAF9" stroke="#D6D3D1" stroke-width="1"/>
  <!-- Session type -->
  <text x="190" y="380" font-family="system-ui" font-size="10" font-weight="600" fill="#57534E">Session Type</text>
  <rect x="190" y="388" width="100" height="30" rx="6" fill="#A78BFA" opacity="0.15" stroke="#A78BFA" stroke-width="1"/>
  <text x="240" y="407" font-family="system-ui" font-size="10" fill="#7C3AED" text-anchor="middle">Indoor</text>
  <rect x="300" y="388" width="100" height="30" rx="6" fill="#FAFAF9" stroke="#D6D3D1" stroke-width="1"/>
  <text x="350" y="407" font-family="system-ui" font-size="10" fill="#78716C" text-anchor="middle">Outdoor</text>
  <!-- Event type -->
  <text x="190" y="440" font-family="system-ui" font-size="10" font-weight="600" fill="#57534E">Event Type</text>
  <rect x="190" y="448" width="220" height="32" rx="6" fill="#FAFAF9" stroke="#D6D3D1" stroke-width="1"/>
  <text x="205" y="468" font-family="system-ui" font-size="10" fill="#A8A29E">Select event type</text>
</svg>
